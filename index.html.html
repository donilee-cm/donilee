<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="아현이 칭찬표">
<meta name="theme-color" content="#7F77DD">
<title>아현이 칭찬표</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #F5F4FB; min-height: 100vh; }

  .app { max-width: 480px; margin: 0 auto; padding: 0 0 40px; }

  .header { background: linear-gradient(135deg, #7F77DD 0%, #534AB7 100%); color: white; padding: 52px 20px 28px; text-align: center; }
  .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  .header .date-label { font-size: 14px; opacity: 0.85; margin-top: 6px; }

  .tabs { display: flex; background: white; border-bottom: 1px solid #EEEDFE; position: sticky; top: 0; z-index: 10; }
  .tab { flex: 1; padding: 14px; font-size: 14px; font-weight: 500; color: #888; text-align: center; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: #534AB7; border-bottom-color: #534AB7; }

  .section { padding: 20px 16px 0; }

  .checklist { display: flex; flex-direction: column; gap: 10px; }
  .check-item { display: flex; align-items: center; gap: 14px; padding: 16px; background: white; border-radius: 14px; border: 1.5px solid #EEEDFE; cursor: pointer; transition: all 0.15s; }
  .check-item.checked { border-color: #7F77DD; background: #EEEDFE; }
  .check-icon { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #CCC; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: #F5F5F5; }
  .check-item.checked .check-icon { background: #7F77DD; border-color: #7F77DD; }
  .check-icon svg { display: none; }
  .check-item.checked .check-icon svg { display: block; }
  .check-label { font-size: 16px; color: #222; font-weight: 400; }
  .check-item.checked .check-label { color: #3C3489; font-weight: 500; }

  .save-area { padding: 20px 16px 0; }
  .save-btn { width: 100%; padding: 16px; background: #7F77DD; color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; letter-spacing: -0.2px; }
  .save-btn:active { background: #534AB7; transform: scale(0.98); }
  .saved-msg { text-align: center; font-size: 14px; color: #534AB7; margin-top: 10px; min-height: 22px; font-weight: 500; }

  .summary-bar { display: flex; gap: 10px; margin-bottom: 16px; }
  .summary-card { flex: 1; background: white; border-radius: 12px; padding: 14px 8px; text-align: center; border: 1px solid #EEEDFE; }
  .summary-card .num { font-size: 24px; font-weight: 700; color: #534AB7; }
  .summary-card .lbl { font-size: 11px; color: #888; margin-top: 3px; }

  .history-header { font-size: 12px; font-weight: 600; color: #AAA; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .history-row { display: flex; align-items: center; padding: 12px 14px; background: white; border-radius: 12px; margin-bottom: 8px; gap: 10px; }
  .history-date { font-size: 14px; color: #555; font-weight: 500; min-width: 38px; }
  .stars { display: flex; gap: 3px; flex-wrap: wrap; }
  .star { font-size: 17px; }
  .empty { text-align: center; padding: 3rem 0; color: #AAA; font-size: 15px; line-height: 1.8; }

  .view { display: none; }
  .view.active { display: block; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🌷 아현이 하루 칭찬표</h1>
    <div class="date-label" id="today-label"></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-today" onclick="showTab('today')">오늘 체크</button>
    <button class="tab" id="tab-history" onclick="showTab('history')">지난 기록</button>
  </div>

  <div id="view-today" class="view active">
    <div class="section">
      <div class="checklist" id="checklist"></div>
    </div>
    <div class="save-area">
      <button class="save-btn" onclick="saveToday()">오늘 저장하기</button>
      <div class="saved-msg" id="saved-msg"></div>
    </div>
  </div>

  <div id="view-history" class="view">
    <div class="section">
      <div class="summary-bar" id="summary-bar"></div>
      <div class="history-header">날짜별 기록</div>
      <div id="history-list"></div>
    </div>
  </div>
</div>

<script>
const ITEMS = [
  { id: 1, label: '정상 출근' },
  { id: 2, label: '정상 수업' },
  { id: 3, label: '부모와 연락 잘하기' },
  { id: 4, label: '손절, 차단하지 않기' },
  { id: 5, label: '귀가시간 지키기' },
  { id: 6, label: '화났지만 참았어요' },
];

let checked = {};
let records = {};
const STORE_KEY = 'ahyeon_praise_records';

function getTodayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function formatLabel(key) {
  const [y, m, d] = key.split('-').map(Number);
  const days = ['일','월','화','수','목','금','토'];
  const dt = new Date(y, m-1, d);
  return `${m}월 ${d}일 (${days[dt.getDay()]})`;
}

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) records = JSON.parse(raw);
  } catch(e) { records = {}; }
  const todayKey = getTodayKey();
  checked = {};
  if (records[todayKey]) records[todayKey].forEach(id => { checked[id] = true; });
  document.getElementById('today-label').textContent = formatLabel(todayKey);
  renderChecklist();
}

function renderChecklist() {
  const cl = document.getElementById('checklist');
  cl.innerHTML = '';
  ITEMS.forEach(item => {
    const div = document.createElement('div');
    div.className = 'check-item' + (checked[item.id] ? ' checked' : '');
    div.innerHTML = `<div class="check-icon"><svg width="14" height="11" viewBox="0 0 14 11" fill="none"><polyline points="1.5,5.5 5,9.5 12.5,1.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="check-label">${item.label}</span>`;
    div.onclick = () => { checked[item.id] = !checked[item.id]; renderChecklist(); };
    cl.appendChild(div);
  });
}

function saveToday() {
  const todayKey = getTodayKey();
  const ids = Object.keys(checked).filter(k => checked[k]).map(Number);
  records[todayKey] = ids;
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(records));
    const msg = document.getElementById('saved-msg');
    msg.textContent = ids.length === 0 ? '저장됐어요. 내일은 더 잘할 수 있어! 💪' : `${ids.length}개 저장! ${'⭐'.repeat(ids.length)}`;
    setTimeout(() => { msg.textContent = ''; }, 3000);
  } catch(e) {
    document.getElementById('saved-msg').textContent = '저장 실패. 저장 공간을 확인해주세요.';
  }
}

function showTab(tab) {
  ['today','history'].forEach(t => {
    document.getElementById('view-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'history') renderHistory();
}

function renderHistory() {
  const keys = Object.keys(records).sort().reverse();
  let totalStars = 0, perfectDays = 0;
  keys.forEach(k => { totalStars += records[k].length; if (records[k].length === ITEMS.length) perfectDays++; });

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-card"><div class="num">${keys.length}</div><div class="lbl">기록한 날</div></div>
    <div class="summary-card"><div class="num">${totalStars}</div><div class="lbl">총 ⭐</div></div>
    <div class="summary-card"><div class="num">${perfectDays}</div><div class="lbl">만점 날 🏆</div></div>
  `;

  const list = document.getElementById('history-list');
  if (!keys.length) {
    list.innerHTML = '<div class="empty">아직 기록이 없어요.<br>오늘부터 시작해봐요! 🌱</div>';
    return;
  }
  list.innerHTML = '';
  keys.forEach(key => {
    const ids = records[key] || [];
    const [,m,d] = key.split('-').map(Number);
    let starsHtml = ITEMS.map(item => `<span class="star">${ids.includes(item.id) ? '⭐' : '☆'}</span>`).join('');
    list.innerHTML += `<div class="history-row"><div class="history-date">${m}/${d}</div><div class="stars">${starsHtml}</div></div>`;
  });
}

load();
</script>
</body>
</html>
